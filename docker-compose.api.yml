# Leoma API Service - Docker Compose
#
# Runs PostgreSQL + Leoma API (FastAPI + background tasks: miner validation,
# score calculation, validator sync). For subnet owners who operate the central API.
#
# Run:
#   docker compose -f docker-compose.api.yml up -d
#
# Required in .env:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB (or DATABASE_URL)
#   NETWORK, NETUID (for metagraph / validator sync and miner validation)
#   ADMIN_HOTKEYS (optional, comma-separated for blacklist admin)
#   OBJECT_STORAGE_BACKEND=r2 (default) or hippius; then R2_* or HIPPIUS_* credentials
#   Samples bucket read/write for presigned URLs and evaluation result uploads
#   For production: set LEOMA_ENV=production and use a strong POSTGRES_PASSWORD or DATABASE_URL

services:
  postgres:
    image: postgres:16-alpine
    container_name: leoma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leoma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leoma}
      POSTGRES_DB: ${POSTGRES_DB:-leoma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leoma} -d ${POSTGRES_DB:-leoma}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: ${LEOMA_IMAGE:-leoma-subnet:latest}
    container_name: leoma-api
    restart: unless-stopped
    command: leoma api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-leoma}:${POSTGRES_PASSWORD:-leoma}@postgres:5432/${POSTGRES_DB:-leoma}
      NETWORK: ${NETWORK:-finney}
      NETUID: ${NETUID:-99}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      MINER_VALIDATION_INTERVAL: ${MINER_VALIDATION_INTERVAL:-300}
      SCORE_CALCULATION_INTERVAL: ${SCORE_CALCULATION_INTERVAL:-300}
      VALIDATOR_SYNC_INTERVAL: ${VALIDATOR_SYNC_INTERVAL:-600}
      ADMIN_HOTKEYS: ${ADMIN_HOTKEYS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-r2}
      HIPPIUS_ENDPOINT: ${HIPPIUS_ENDPOINT:-s3.hippius.com}
      HIPPIUS_REGION: ${HIPPIUS_REGION:-decentralized}
      HIPPIUS_SAMPLES_BUCKET: ${HIPPIUS_SAMPLES_BUCKET:-samples}
      HIPPIUS_SAMPLES_READ_ACCESS_KEY: ${HIPPIUS_SAMPLES_READ_ACCESS_KEY}
      HIPPIUS_SAMPLES_READ_SECRET_KEY: ${HIPPIUS_SAMPLES_READ_SECRET_KEY}
      HIPPIUS_SAMPLES_WRITE_ACCESS_KEY: ${HIPPIUS_SAMPLES_WRITE_ACCESS_KEY}
      HIPPIUS_SAMPLES_WRITE_SECRET_KEY: ${HIPPIUS_SAMPLES_WRITE_SECRET_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_SOURCE_BUCKET: ${R2_SOURCE_BUCKET:-videos}
      R2_SAMPLES_BUCKET: ${R2_SAMPLES_BUCKET:-samples}
      R2_VIDEOS_READ_ACCESS_KEY: ${R2_VIDEOS_READ_ACCESS_KEY:-}
      R2_VIDEOS_READ_SECRET_KEY: ${R2_VIDEOS_READ_SECRET_KEY:-}
      R2_VIDEOS_WRITE_ACCESS_KEY: ${R2_VIDEOS_WRITE_ACCESS_KEY:-}
      R2_VIDEOS_WRITE_SECRET_KEY: ${R2_VIDEOS_WRITE_SECRET_KEY:-}
      R2_SAMPLES_READ_ACCESS_KEY: ${R2_SAMPLES_READ_ACCESS_KEY:-}
      R2_SAMPLES_READ_SECRET_KEY: ${R2_SAMPLES_READ_SECRET_KEY:-}
      R2_SAMPLES_WRITE_ACCESS_KEY: ${R2_SAMPLES_WRITE_ACCESS_KEY:-}
      R2_SAMPLES_WRITE_SECRET_KEY: ${R2_SAMPLES_WRITE_SECRET_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      CHUTES_API_KEY: ${CHUTES_API_KEY:-}
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

# Leoma API Service - Docker Compose
#
# Runs PostgreSQL + Leoma API (FastAPI + background tasks: miner validation,
# score calculation, validator sync). For subnet owners who operate the central API.
#
# Run:
#   docker compose -f docker-compose.api.yml up -d
#
# Configure via .env (see env.owner-api.example). Key vars:
#   POSTGRES_USER/PASSWORD/DB (or DATABASE_URL)   — database (required)
#   NETWORK, NETUID                               — current block + validator stake refresh
#   ADMIN_HOTKEYS (comma-separated)               — REQUIRED to add validators (leoma validator add ...)
#   PEER_VALIDATORS (optional)                    — read creds to presign dashboard task media
#   CHUTES_API_KEY (optional)                     — richer "active miner" chute probing
#   For production: set LEOMA_ENV=production and use a strong POSTGRES_PASSWORD or DATABASE_URL
#
# Validators are owner-managed in the DB (leoma validator add/remove/list), NOT an env var.

services:
  postgres:
    image: postgres:16-alpine
    container_name: leoma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leoma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leoma}
      POSTGRES_DB: ${POSTGRES_DB:-leoma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leoma} -d ${POSTGRES_DB:-leoma}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: ${LEOMA_IMAGE:-leoma-subnet:latest}
    container_name: leoma-api
    restart: unless-stopped
    command: leoma api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-leoma}:${POSTGRES_PASSWORD:-leoma}@postgres:5432/${POSTGRES_DB:-leoma}
      NETWORK: ${NETWORK:-finney}
      NETUID: ${NETUID:-99}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      # REQUIRED — admin hotkeys that can add/remove validators and manage the blacklist.
      ADMIN_HOTKEYS: ${ADMIN_HOTKEYS:-}
      SAMPLING_ROTATION_INTERVAL: ${SAMPLING_ROTATION_INTERVAL:-100}
      # Background-task cadences (seconds).
      MINER_VALIDATION_INTERVAL: ${MINER_VALIDATION_INTERVAL:-300}
      SCORE_CALCULATION_INTERVAL: ${SCORE_CALCULATION_INTERVAL:-300}
      VALIDATOR_SYNC_INTERVAL: ${VALIDATOR_SYNC_INTERVAL:-600}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Optional: peer read creds so the dashboard can presign task media from each sampler's bucket.
      PEER_VALIDATORS: ${PEER_VALIDATORS:-}
      # Optional: lets the "active miner" filter read private chute info (probe works without it).
      CHUTES_API_KEY: ${CHUTES_API_KEY:-}
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

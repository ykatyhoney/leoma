# Leoma Subnet — king of the hill.
#
# Two roles: the validator (scans reveals, dispatches duels, sets weights) and
# the eval server (GPU box that downloads + runs miner models). They are usually
# on separate hosts; this compose is a convenience for co-locating them.
services:
  # Validator: scan reveals -> duel via eval server -> crown -> set weights.
  validator:
    build: .
    image: rendixnetwork/leoma:latest
    container_name: leoma-validator
    restart: unless-stopped
    command: leoma serve
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      NETWORK: ${NETWORK:-finney}
      NETUID: ${NETUID:-99}
      WALLET_NAME: ${WALLET_NAME:-default}
      HOTKEY_NAME: ${HOTKEY_NAME:-default}
      EVAL_SERVER_URL: ${EVAL_SERVER_URL:-http://eval-server:9000}
      # Duel parameters — identical across validators for consensus.
      LEOMA_DUEL_METRIC: ${LEOMA_DUEL_METRIC:-lpips}
      LEOMA_DUEL_N_CLIPS: ${LEOMA_DUEL_N_CLIPS:-32}
      LEOMA_DELTA_THRESHOLD: ${LEOMA_DELTA_THRESHOLD:-0.0025}
      LEOMA_ALPHA: ${LEOMA_ALPHA:-0.001}
      LEOMA_N_BOOTSTRAP: ${LEOMA_N_BOOTSTRAP:-10000}
      # This validator's own state bucket (durable king state).
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-r2}
      R2_OWN_BUCKET: ${R2_OWN_BUCKET:-}
      R2_OWN_WRITE_ACCESS_KEY: ${R2_OWN_WRITE_ACCESS_KEY:-}
      R2_OWN_WRITE_SECRET_KEY: ${R2_OWN_WRITE_SECRET_KEY:-}
      R2_OWN_ENDPOINT: ${R2_OWN_ENDPOINT:-}
      R2_OWN_REGION: ${R2_OWN_REGION:-auto}

  # Eval server: GPU box that downloads king + challenger and runs the duel.
  # Requires an NVIDIA runtime; install leoma with the [eval] extra in the image.
  eval-server:
    build: .
    image: rendixnetwork/leoma:latest
    container_name: leoma-eval-server
    restart: unless-stopped
    command: leoma servers eval-server
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      EVAL_SERVER_HOST: "0.0.0.0"
      EVAL_SERVER_PORT: "9000"
      HIPPIUS_HUB_TOKEN: ${HIPPIUS_HUB_TOKEN:-}
      LEOMA_MODEL_CACHE_DIR: ${LEOMA_MODEL_CACHE_DIR:-/tmp/leoma/hippius_models}
      R2_VIDEOS_READ_ACCESS_KEY: ${R2_VIDEOS_READ_ACCESS_KEY:-}
      R2_VIDEOS_READ_SECRET_KEY: ${R2_VIDEOS_READ_SECRET_KEY:-}
    # deploy:  # uncomment on a GPU host

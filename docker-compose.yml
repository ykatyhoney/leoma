# Leoma Subnet Docker Compose (validator only)

services:
  # Validator: evaluator + weight setter in one container
  validator:
    build: .
    image: rendixnetwork/leoma:latest
    container_name: leoma-validator
    restart: unless-stopped
    command: leoma serve
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      API_URL: ${API_URL}
      NETWORK: ${NETWORK:-finney}
      NETUID: ${NETUID:-99}
      EPOCH_LEN: ${EPOCH_LEN:-180}
      WALLET_NAME: ${WALLET_NAME:-default}
      HOTKEY_NAME: ${HOTKEY_NAME:-default}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CHUTES_API_KEY: ${CHUTES_API_KEY}
      # Miner validation (each validator validates miners itself and reports to the owner-api)
      HF_TOKEN: ${HF_TOKEN:-}
      MINER_VALIDATION_INTERVAL: ${MINER_VALIDATION_INTERVAL:-300}
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-r2}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_SOURCE_BUCKET: ${R2_SOURCE_BUCKET:-leoma-videos}
      # Source bucket read creds (sampler downloads source clips)
      R2_VIDEOS_READ_ACCESS_KEY: ${R2_VIDEOS_READ_ACCESS_KEY:-}
      R2_VIDEOS_READ_SECRET_KEY: ${R2_VIDEOS_READ_SECRET_KEY:-}
      # This validator's own result bucket (sampler + evaluator publish here)
      R2_OWN_BUCKET: ${R2_OWN_BUCKET:-}
      R2_OWN_WRITE_ACCESS_KEY: ${R2_OWN_WRITE_ACCESS_KEY:-}
      R2_OWN_WRITE_SECRET_KEY: ${R2_OWN_WRITE_SECRET_KEY:-}
      R2_OWN_ENDPOINT: ${R2_OWN_ENDPOINT:-}
      R2_OWN_REGION: ${R2_OWN_REGION:-auto}
      # Peer result buckets (read creds) for equal-weight aggregation
      PEER_VALIDATORS: ${PEER_VALIDATORS:-}
      SAMPLER_POLL_INTERVAL: ${SAMPLER_POLL_INTERVAL:-60}
    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro

  # Watchtower: polls registry and restarts leoma-validator when image is updated
  watchtower:
    image: nickfedor/watchtower
    container_name: leoma-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 leoma-validator
